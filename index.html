<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>付款統計表</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f0f2f5;
  color: #1a2035;
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
  padding: 28px 28px 56px;
}

/* ── HEADER ── */
header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
}
.header-left h1 { font-size: 21px; font-weight: 900; color: #1a2035; letter-spacing: -0.3px; }
.header-left p  { font-size: 12px; color: #9aa4b8; margin-top: 3px; }
.date-chip {
  font-family: 'Space Mono', monospace; font-size: 11px; color: #fff;
  background: #3d5af1; padding: 6px 16px; border-radius: 99px;
}

/* ── CAT TABS ── */
.cat-tabs {
  display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
}
.cat-tab {
  font-size: 13px; font-weight: 700; padding: 9px 22px;
  border-radius: 10px; border: none; cursor: pointer;
  transition: all 0.18s; background: #fff; color: #9aa4b8;
  font-family: 'Noto Sans TC', sans-serif;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.cat-tab:hover { color: #1a2035; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
.cat-tab.active { color: #fff; }
.cat-tab[data-cat="total"].active   { background: #3d5af1; }
.cat-tab[data-cat="overdue"].active { background: #ef4444; }
.cat-tab[data-cat="week"].active    { background: #f59e0b; }
.cat-tab[data-cat="month"].active   { background: #10b981; }

/* ── SINGLE CARD DISPLAY ── */
.cards-grid {
  display: block;
  margin-bottom: 28px;
  max-width: 360px;
}

.summary-card {
  background: #fff; border-radius: 14px;
  border-top: 4px solid var(--ac); padding: 22px 22px 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 2px 12px rgba(0,0,0,0.04);
  display: none; /* hidden by default */
}
.summary-card.active {
  display: block; /* only active card shown */
}

.summary-card[data-type="total"]   { --ac: #3d5af1; }
.summary-card[data-type="overdue"] { --ac: #ef4444; }
.summary-card[data-type="week"]    { --ac: #f59e0b; }
.summary-card[data-type="month"]   { --ac: #10b981; }

.card-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.card-name { font-size: 13px; font-weight: 700; color: #1a2035; }
.card-count {
  font-family: 'Space Mono', monospace; font-size: 10px;
  color: var(--ac);
  background: color-mix(in srgb, var(--ac) 10%, #fff);
  border: 1px solid color-mix(in srgb, var(--ac) 22%, transparent);
  padding: 2px 9px; border-radius: 99px;
}

/* currency rows inside card */
.curr-list { display: flex; flex-direction: column; gap: 8px; }
.curr-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 9px; background: #f8f9fc;
  cursor: pointer; transition: background 0.12s;
}
.curr-item:hover { background: #eef1f9; }
.curr-item.active-curr {
  background: color-mix(in srgb, var(--ac) 9%, #fff);
  outline: 1.5px solid color-mix(in srgb, var(--ac) 35%, transparent);
}
.curr-badge {
  font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
  color: var(--ac);
  background: color-mix(in srgb, var(--ac) 12%, #fff);
  border: 1px solid color-mix(in srgb, var(--ac) 28%, transparent);
  padding: 2px 7px; border-radius: 4px; min-width: 36px; text-align: center; flex-shrink: 0;
}
.curr-amount {
  font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700;
  color: #1a2035; flex: 1; text-align: right; letter-spacing: -0.5px;
}
.curr-amount.zero { color: #c5ccd9; font-size: 12px; font-weight: 400; }
.curr-sub {
  font-size: 10px; color: #b0bacc; text-align: right; white-space: nowrap;
}

/* ── DETAIL TABLE ── */
.detail-section {
  background: #fff; border-radius: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 2px 12px rgba(0,0,0,0.04);
  overflow: hidden;
}
.detail-header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 22px; border-bottom: 1px solid #eef1f7; flex-wrap: wrap;
}
.detail-title { font-size: 14px; font-weight: 700; color: #1a2035; }
.detail-count {
  font-family: 'Space Mono', monospace; font-size: 11px;
  color: #9aa4b8; background: #f0f2f5; padding: 3px 10px; border-radius: 99px;
}
.filter-bar {
  display: flex; gap: 6px; padding: 12px 22px;
  border-bottom: 1px solid #eef1f7; flex-wrap: wrap; align-items: center;
}
.filter-label { font-size: 11px; color: #b0bacc; font-weight: 600; letter-spacing: 0.5px; margin-right: 4px; }
.filter-btn {
  font-size: 11px; font-weight: 600; padding: 5px 14px;
  border-radius: 6px; border: 1.5px solid #eef1f7;
  background: #fff; color: #9aa4b8; cursor: pointer;
  transition: all 0.13s; font-family: 'Noto Sans TC', sans-serif;
}
.filter-btn:hover { border-color: #c5ccd9; color: #1a2035; }
.filter-btn.active { background: #1a2035; border-color: #1a2035; color: #fff; }

.table-wrapper { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: #f8f9fc; color: #b0bacc; font-size: 10px; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  padding: 11px 18px; text-align: left;
  border-bottom: 1px solid #eef1f7; white-space: nowrap;
}
tbody tr { border-bottom: 1px solid #f4f6fb; transition: background 0.1s; }
tbody tr:hover { background: #f8f9fc; }
tbody tr:last-child { border-bottom: none; }
td { padding: 12px 18px; vertical-align: middle; color: #4a5568; }
td.dept { color: #1a2035; font-weight: 600; }
td.status .badge {
  font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 5px; white-space: nowrap;
}
.badge-overdue { background:#fef2f2; color:#ef4444; border:1px solid #fecaca; }
.badge-payable { background:#f0fdf4; color:#10b981; border:1px solid #bbf7d0; }
.badge-notice  { background:#fffbeb; color:#f59e0b; border:1px solid #fde68a; }
td.amount {
  font-family:'Space Mono',monospace; font-size:13px; font-weight:700;
  text-align:right; color:#1a2035; white-space:nowrap;
}
td.date { font-family:'Space Mono',monospace; font-size:11px; white-space:nowrap; color:#9aa4b8; }
td.date.past { color:#ef4444; font-weight:700; }
td.remark {
  max-width:240px; overflow:hidden; text-overflow:ellipsis;
  white-space:nowrap; color:#9aa4b8; font-size:12px;
}
.empty-state { text-align:center; padding:56px; color:#c5ccd9; font-size:13px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>付款統計表</h1>
    <p id="date-sub"></p>
  </div>
  <span class="date-chip" id="date-chip"></span>
</header>

<!-- CAT TABS -->
<div class="cat-tabs">
  <button class="cat-tab active" data-cat="total"   onclick="selectCat('total')">📊 全部總額</button>
  <button class="cat-tab"        data-cat="overdue" onclick="selectCat('overdue')">⚠️ 逾期</button>
  <button class="cat-tab"        data-cat="week"    onclick="selectCat('week')">📅 當周</button>
  <button class="cat-tab"        data-cat="month"   onclick="selectCat('month')">🗓 當月</button>
</div>

<!-- SINGLE CARD (switches based on tab) -->
<div class="cards-grid">
  <div class="summary-card active" data-type="total">
    <div class="card-head"><span class="card-name">📊 全部總額</span><span class="card-count" id="cnt-total">0 筆</span></div>
    <div class="curr-list" id="cl-total"></div>
  </div>
  <div class="summary-card" data-type="overdue">
    <div class="card-head"><span class="card-name">⚠️ 逾期</span><span class="card-count" id="cnt-overdue">0 筆</span></div>
    <div class="curr-list" id="cl-overdue"></div>
  </div>
  <div class="summary-card" data-type="week">
    <div class="card-head"><span class="card-name">📅 當周</span><span class="card-count" id="cnt-week">0 筆</span></div>
    <div class="curr-list" id="cl-week"></div>
  </div>
  <div class="summary-card" data-type="month">
    <div class="card-head"><span class="card-name">🗓 當月</span><span class="card-count" id="cnt-month">0 筆</span></div>
    <div class="curr-list" id="cl-month"></div>
  </div>
</div>

<!-- DETAIL -->
<div class="detail-section">
  <div class="detail-header">
    <span class="detail-title" id="detail-title">全部總額　全幣別　明細</span>
    <span class="detail-count" id="detail-count">0 筆</span>
  </div>
  <div class="filter-bar">
    <span class="filter-label">部門</span>
    <button class="filter-btn active" data-dept="all"  onclick="filterDept('all')">全部</button>
    <button class="filter-btn"        data-dept="貿易" onclick="filterDept('貿易')">貿易</button>
    <button class="filter-btn"        data-dept="船務" onclick="filterDept('船務')">船務</button>
  </div>
  <div class="table-wrapper">
    <table>
      <thead><tr>
        <th>部門</th><th>狀態</th><th>付款日</th><th>類別</th><th>備註</th>
        <th style="text-align:right">金額</th>
      </tr></thead>
      <tbody id="detail-body"></tbody>
    </table>
  </div>
</div>

/* ── DATE ── */
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
function parseDate(s) {
  const [y,m,d]=s.split('/').map(Number);
  const dt=new Date(y,m-1,d); dt.setHours(0,0,0,0); return dt;
}
const dow=TODAY.getDay();
const WS=new Date(TODAY); WS.setDate(TODAY.getDate()+(dow===0?-6:1-dow));
const WE=new Date(WS); WE.setDate(WS.getDate()+6);
const MS=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
const ME=new Date(TODAY.getFullYear(),TODAY.getMonth()+1,0);

const isOverdue  = r => parseDate(r.date)<TODAY;
const isThisWeek = r => { const d=parseDate(r.date); return d>=TODAY&&d>=WS&&d<=WE; };
const isThisMonth= r => { const d=parseDate(r.date); return d>=TODAY&&d>=MS&&d<=ME; };

const CATS = {
  total:   { label:'全部總額', fn:()=>true },
  overdue: { label:'逾期',     fn:isOverdue },
  week:    { label:'當周',     fn:isThisWeek },
  month:   { label:'當月',     fn:isThisMonth },
};
const CURRENCIES = ['NTD','USD','JPY','EUR','ZAR'];

/* ── FORMAT ── */
function fmtShort(curr, amt) {
  if(amt===0) return '—';
  if(curr==='NTD'||curr==='JPY'||curr==='ZAR') return Math.round(amt).toLocaleString();
  return amt.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}
function fmtFull(curr, amt) {
  if(amt===0)return'—';
  if(curr==='JPY') return 'JPY '+Math.round(amt).toLocaleString();
  if(curr==='NTD') return 'NT$'+Math.round(amt).toLocaleString();
  if(curr==='USD') return 'US$'+amt.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  if(curr==='EUR') return '€'+amt.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  if(curr==='ZAR') return 'ZAR '+Math.round(amt).toLocaleString();
  return amt.toLocaleString();
}

/* ── STATE ── */
let activeCat  = 'total';
let activeCurr = 'ALL';
let activeDept = 'all';

/* ── RENDER CARD LISTS ── */
function buildCurrList(catKey) {
  const rows = RAW.filter(CATS[catKey].fn);
  const isActiveCat = catKey === activeCat;
  let html = '';

  CURRENCIES.forEach(c => {
    const sum = rows.filter(r=>r.curr===c).reduce((s,r)=>s+r.amt,0);
    const cnt = rows.filter(r=>r.curr===c).length;
    if(sum===0) return;
    const rowActive = isActiveCat && activeCurr===c;
    html += `<div class="curr-item${rowActive?' active-curr':''}"
      onclick="pickCurr(event,'${catKey}','${c}')">
      <span class="curr-badge">${c}</span>
      <span class="curr-amount">${fmtShort(c,sum)}</span>
    </div>`;
  });

  if(!html) html = `<div style="color:#c5ccd9;font-size:12px;padding:8px 4px">無資料</div>`;

  document.getElementById('cl-'+catKey).innerHTML = html;
  document.getElementById('cnt-'+catKey).textContent = rows.length+' 筆';
}

function renderAllCards() {
  Object.keys(CATS).forEach(k => buildCurrList(k));
}

/* ── CAT TAB ── */
function selectCat(cat) {
  activeCat  = cat;
  activeCurr = 'ALL';
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.cat-tab[data-cat="${cat}"]`).classList.add('active');
  // show only the matching card
  document.querySelectorAll('.summary-card').forEach(c=>c.classList.remove('active'));
  document.querySelector(`.summary-card[data-type="${cat}"]`).classList.add('active');
  renderAllCards();
  renderTable();
}

/* ── CLICK CURRENCY ROW ── */
function pickCurr(e, catKey, curr) {
  e.stopPropagation();
  activeCurr = curr;
  renderAllCards();
  renderTable();
}

/* ── DEPT FILTER ── */
function filterDept(dept) {
  activeDept = dept;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.filter-btn[data-dept="${dept}"]`).classList.add('active');
  renderTable();
}

/* ── BADGE ── */
function badgeClass(r){
  if(isOverdue(r)) return 'badge-overdue';
  if(r.status==='案件通知') return 'badge-notice';
  return 'badge-payable';
}
function badgeLabel(r){
  if(isOverdue(r)) return '逾期';
  if(r.status==='案件通知') return '案件通知';
  return '應付';
}

/* ── TABLE ── */
function renderTable() {
  let rows = RAW.filter(CATS[activeCat].fn);
  if(activeCurr!=='ALL') rows=rows.filter(r=>r.curr===activeCurr);
  if(activeDept!=='all') rows=rows.filter(r=>r.dept===activeDept);

  const currLabel = activeCurr==='ALL'?'全幣別':activeCurr;
  document.getElementById('detail-title').textContent =
    CATS[activeCat].label+'　'+currLabel+'　明細';
  document.getElementById('detail-count').textContent = rows.length+' 筆';

  const tbody=document.getElementById('detail-body');
  if(!rows.length){
    tbody.innerHTML=`<tr><td colspan="6" class="empty-state">無符合資料</td></tr>`;
    return;
  }
  tbody.innerHTML=rows.map(r=>{
    const past=parseDate(r.date)<TODAY;
    return `<tr>
      <td class="dept">${r.dept}</td>
      <td class="status"><span class="badge ${badgeClass(r)}">${badgeLabel(r)}</span></td>
      <td class="date ${past?'past':''}">${r.date}</td>
      <td>${r.cat}</td>
      <td class="remark" title="${r.remark}">${r.remark}</td>
      <td class="amount">${fmtFull(r.curr,r.amt)}</td>
    </tr>`;
  }).join('');
}

/* ── INIT ── */
function init(){
  const p2=n=>n.toString().padStart(2,'0');
  const fd=d=>d.getFullYear()+'/'+p2(d.getMonth()+1)+'/'+p2(d.getDate());
  const fm=d=>p2(d.getMonth()+1)+'/'+p2(d.getDate());
  document.getElementById('date-chip').textContent='今日 '+fd(TODAY);
  document.getElementById('date-sub').textContent=
    '當周：'+fm(WS)+'–'+fm(WE)+'　當月：'+TODAY.getFullYear()+'/'+p2(TODAY.getMonth()+1);
  renderAllCards();
  renderTable();
}
init();
