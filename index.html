<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>應付帳款總表 - 簡約版</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&family=JetBrains+Mono:wght@600&display=swap');

:root {
  --bg: #0f172a; --sur: #1e293b; --bdr: #334155; --txt: #f8fafc; --mut: #94a3b8;
  --c-ntd: #38bdf8; --c-usd: #4ade80; --c-jpy: #fbbf24; --c-eur: #c084fc; --c-zar: #f87171;
}

body { background: var(--bg); color: var(--txt); font-family: 'Noto Sans TC', sans-serif; margin: 0; padding: 20px; }

/* 大字卡設計 */
.card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
.big-card { 
  background: var(--sur); border: 1px solid var(--bdr); border-radius: 12px; 
  padding: 25px; display: flex; flex-direction: column; justify-content: center;
}
.card-cur { font-size: 16px; font-weight: 700; margin-bottom: 10px; letter-spacing: 1px; }
.card-amt { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 600; line-height: 1; }

/* 部門佔比清單 */
.dept-list { margin-top: 20px; border-top: 1px solid var(--bdr); padding-top: 15px; display: flex; flex-direction: column; gap: 10px; }
.dept-item { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
.dept-name { color: var(--mut); display: flex; align-items: center; gap: 8px; }
.dept-dot { width: 6px; height: 6px; border-radius: 50%; }
.dept-val { display: flex; gap: 12px; align-items: baseline; }
.dept-pct { font-size: 12px; color: var(--mut); min-width: 35px; text-align: right; }

/* 區塊標題 */
h2 { font-size: 14px; color: var(--mut); text-transform: uppercase; letter-spacing: 2px; margin: 40px 0 20px; border-left: 4px solid var(--bdr); padding-left: 10px; }

/* 簡易篩選與表格略... */
input[type="file"] { margin-bottom: 20px; color: var(--mut); }
</style>
</head>
<body>

<h1>應付帳款總表</h1>
<input type="file" id="upload" multiple onchange="handleFiles(this.files)">

<h2>應付總額 (各幣別)</h2>
<div id="summaryCards" class="card-grid"></div>

<h2>逾期帳款</h2>
<div id="overdueCards" class="card-grid"></div>

<h2>當月帳款</h2>
<div id="monthlyCards" class="card-grid"></div>

<h2>篩選檢視</h2>
<div id="filterCards" class="card-grid"></div>

<script>
let rawData = [];
const CUR_META = {
  'NTD': { color: 'var(--c-ntd)' },
  'USD': { color: 'var(--c-usd)' },
  'JPY': { color: 'var(--c-jpy)' },
  'EUR': { color: 'var(--c-eur)' },
  'ZAR': { color: 'var(--c-zar)' }
};

// 解析邏輯 (延用先前的核心)
async function handleFiles(files) {
  rawData = [];
  for (let f of files) {
    const data = await f.arrayBuffer();
    const workbook = XLSX.read(data);
    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
    json.forEach(r => { if(r['部門']) rawData.push(r); });
  }
  renderAll();
}

function renderAll() {
  const isM = (d) => {
    if(!d) return false;
    const date = new Date(d);
    return date.getMonth() === new Date().getMonth() && date.getFullYear() === new Date().getFullYear();
  };

  renderCards('summaryCards', rawData);
  renderCards('overdueCards', rawData.filter(r => r['狀態'] === '逾期'));
  renderCards('monthlyCards', rawData.filter(r => isM(r['付款日'])));
  renderCards('filterCards', rawData); // 此處可根據篩選器邏輯連動
}

function renderCards(containerId, data) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  
  const currencies = ['NTD', 'USD', 'JPY', 'EUR', 'ZAR'];
  
  currencies.forEach(cur => {
    const items = data.filter(r => r[cur] && r[cur] > 0);
    const total = items.reduce((sum, r) => sum + r[cur], 0);
    if (total === 0) return;

    const depts = [...new Set(items.map(r => r['部門']))];
    const deptSummary = depts.map(d => {
      const amt = items.filter(r => r['部門'] === d).reduce((sum, r) => sum + r[cur], 0);
      return { name: d, amt, pct: Math.round((amt / total) * 100) };
    }).sort((a, b) => b.amt - a.amt);

    const card = document.createElement('div');
    card.className = 'big-card';
    card.style.borderTop = `4px solid ${CUR_META[cur].color}`;
    
    card.innerHTML = `
      <div class="card-cur" style="color: ${CUR_META[cur].color}">${cur}</div>
      <div class="card-amt">${total.toLocaleString()}</div>
      <div class="dept-list">
        ${deptSummary.map(ds => `
          <div class="dept-item">
            <div class="dept-name">
              <span class="dept-dot" style="background: ${CUR_META[cur].color}"></span>
              ${ds.name}
            </div>
            <div class="dept-val">
              <span>${ds.amt.toLocaleString()}</span>
              <span class="dept-pct">${ds.pct}%</span>
            </div>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(card);
  });
}
</script>
</body>
</html>
